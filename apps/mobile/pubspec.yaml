name: matflow_mobile
description: MatFlow field companion app.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_svg: ^2.0.16
  flutter_map: ^6.1.0
  http: ^1.2.2
  image_picker: ^1.1.2
  latlong2: ^0.9.1
  provider: ^6.1.2
  shared_preferences: ^2.3.3
  mobile_scanner: ^5.2.3

dev_dependencies:
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/logo.svg
